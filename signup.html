<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">

</head>

<body class="login-body">

<div class="login-page">

    <div class="login-left">

        <h1>Student Budget Planner</h1>

        <p>Create your account and start managing your finances smarter.</p>

        <div class="login-image">
            <i class="ri-wallet-3-fill wallet-icon"></i>
        </div>

    </div>

    <div class="login-right">

        <form class="login-form" id="signupForm">

            <h2>Create Account ✨</h2>

            <p>Fill the details below</p>

            <label>Full Name</label>
            <input type="text" id="signupName" placeholder="Enter your full name">

            <label>Email</label>
            <input type="email"id="signupEmail"placeholder="Enter your email">

            <label>Password</label>
            <input type="password" id="signupPassword" placeholder="Create password">

            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm password">

<button type="submit" id="signupBtn">
    <i class="ri-user-add-line"></i>
    Create Account
</button>
            <p>

                Already have an account?

                <a href="index.html">Login</a>

            </p>

        </form>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
