<body>

<div class="wrapper">

    <aside class="sidebar">

        <div class="brand">
            <i class="ri-wallet-3-fill"></i>
            <h2>Budget Planner</h2>
        </div>

        <ul>

            <li>
                <a href="dashboard.html">
                    <i class="ri-home-5-fill"></i>
                    <span>Dashboard</span></a>
                
            </li>

            <li>
                <a href="income.html">
                    <i class="ri-money-rupee-circle-fill"></i>
                    <span>Income</span></a>
                
            </li>

            <li>
                <a href="expense.html">
                    <i class="ri-shopping-cart-2-fill"></i>
                    <span>Expenses</span></a>
                
            </li>

            <li>
                <a href="history.html">
                    <i class="ri-history-line"></i>
                    <span>History</span></a>
                
            </li>

            <li>
                <a href="report.html">
                    <i class="ri-bar-chart-box-line"></i>
                    <span>Reports</span></a>
    
            </li>

            <li class="active">
                <a href="settings.html">
                    <i class="ri-settings-3-line"></i>
                    <span>Settings</span></a>
                
            </li>

        </ul>

    </aside>

    <section class="dashboard">

        <nav class="topbar">

            <h2>Settings</h2>

            <div class="profile">

    <div class="notification-menu">

        <i class="ri-notification-3-line" id="notificationIcon"></i>

        <div class="notification-dropdown" id="notificationDropdown">

        </div>

    </div>

    <div class="profile-menu">

        <i class="ri-account-circle-fill" id="profileIcon"></i>

        <div class="dropdown" id="profileDropdown">

            <a href="settings.html">⚙️ Settings</a>
            <a href="#" id="logoutBtn">🚪 Logout</a>

        </div>

    </div>

</div>
        </nav>

        <div class="page-title">
            <h1>Account Settings</h1>
            <p>Manage your account information.</p>
        </div>

        <div class="settings-grid">

            <div class="settings-card">

                <h3>Profile Information</h3>

                <label>Full Name</label>
<input type="text" id="profileName" placeholder="Enter your name">
                <label>Email</label>
                <input type="email" id="profileEmail" placeholder="Enter your email">

                <button id="updateProfile">Update Profile</button>

            </div>

            <div class="settings-card">

                <h3>Change Password</h3>

                <label>Current Password</label>
                <input type="password" id="currentPassword">

                <label>New Password</label>
                <input type="password" id="newPassword">

                <label>Confirm Password</label>
                <input type="password"id="confirmPassword" >

                <button id="updatePassword">Update Password</button>

            </div>

        </div>

        <div class="logout-card">

            <h3>Logout</h3>

            <p>Click the button below to logout from your account.</p>

            <button class="logout-btn">Logout</button>

        </div>

    </section>

</div>

<script src="script.js"></script>
<script src="script3.js"></script>
